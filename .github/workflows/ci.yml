name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start local server
        run: npx serve . -l 8080 &

      - name: Wait for server
        run: npx wait-on http://localhost:8080 --timeout 10000

      - name: Run HR Avatar E2E tests
        run: npm run test:hr

      - name: Run Code Interview E2E tests
        run: npm run test:code

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check SDK file sizes
        run: |
          MAX_SIZE=8192
          SIZE=$(wc -c < kaltura-avatar-sdk.min.js)
          echo "SDK minified size: ${SIZE} bytes"
          if [ "$SIZE" -gt "$MAX_SIZE" ]; then
            echo "::error::SDK minified size ($SIZE bytes) exceeds limit ($MAX_SIZE bytes)"
            exit 1
          fi

      - name: Validate JSON schemas
        run: |
          for f in $(find . -name "*.schema.json"); do
            echo "Validating: $f"
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))" || exit 1
          done

      - name: Check for console.log in SDK
        run: |
          if grep -n "console.log" kaltura-avatar-sdk.js | grep -v "console.error"; then
            echo "::warning::Found console.log in SDK source (only console.error is allowed)"
          fi
